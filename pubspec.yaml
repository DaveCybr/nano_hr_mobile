name: nano_hr_mobile
description: "nano.HR — HR Attendance System for PT Nano Indonesia Sakti"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^13.2.4

  # Camera & image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Location & maps
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # HTTP (untuk Face++ API)
  http: ^1.2.1
  dio: ^5.4.3+1

  # Storage & preferences
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI utilities
  intl: ^0.20.2
  timeago: ^3.6.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fluttertoast: ^9.0.0
  permission_handler: ^11.3.1

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  lucide_icons: ^0.257.0

  # App info & update
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # Env
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
